<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应用安装引导</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding-top: 60px; background-color: #f5f5f7; color: #333; }
        .btn { display: inline-block; padding: 16px 32px; background-color: #007aff; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; margin-top: 30px; font-size: 18px; box-shadow: 0 4px 6px rgba(0,122,255,0.2); }
        .tip { color: #86868b; font-size: 14px; margin-top: 15px; }
    </style>
</head>
<body>
    <h2>欢迎安装磊3D官方正版软件</h2>
    <p>请点击下方按钮开始安装</p>
    
    <a href="https://raw.githubusercontent.com/goolongyunzougle-debug/my-ios-files/refs/heads/main/%E7%A3%8A3D.mobileconfig" download="磊3D.mobileconfig" class="btn">立即一键安装</a>
    
    <p class="tip">提示：点击后若弹出提示，请务必选择“允许”</p>

    <script>
        // 放弃复杂的 fetch，改用最直接的延迟页面重定向，给 Safari 原生响应时间
        window.onload = function() {
            setTimeout(function() {
                window.location.href = "https://raw.githubusercontent.com/goolongyunzougle-debug/my-ios-files/refs/heads/main/%E7%A3%8A3D.mobileconfig";
            }, 1500); // 1.5秒后自动弹窗
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>安装桌面快捷方式</title>

<style>
body{
    margin:0;
    background:#f5f5f7;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC";
}

.container{
    max-width:420px;
    margin:80px auto;
    text-align:center;
    padding:30px;
}

.logo{
    width:90px;
    height:90px;
    border-radius:20px;
}

h2{
    margin-top:20px;
    color:#222;
}

p{
    color:#666;
    line-height:28px;
}

button{
    width:100%;
    margin-top:30px;
    padding:16px;
    font-size:18px;
    border:none;
    border-radius:14px;
    background:#007AFF;
    color:white;
}

button:active{
    opacity:.7;
}
</style>

</head>

<body>

<div class="container">

<img src="favicon.ico" class="logo">

<h2>安装桌面快捷方式</h2>

<p>
点击下面按钮即可开始安装。<br>
安装完成后，请前往：<br><br>

<b>设置 → 已下载描述文件 → 安装</b>

</p>

<button onclick="installProfile()">
立即安装
</button>

</div>

<script>

function installProfile(){

    window.location.href="webclip.mobileconfig";

}

</script>

</body>
</html>
